name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Build release
        run: |
          xcodebuild build \
            -project Nola.xcodeproj \
            -scheme Nola \
            -configuration Release \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Create DMG
        if: github.event_name == 'push'
        run: |
          hdiutil create \
            -volname "Nola" \
            -srcfolder build/derived/Build/Products/Release/Nola.app \
            -ov -format UDZO \
            Nola.dmg

      - name: Update latest release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Build
          body: "Built from `main` at ${{ github.sha }}"
          files: Nola.dmg
          prerelease: true
          make_latest: true
