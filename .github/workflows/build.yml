name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Build release
        run: |
          xcodebuild build \
            -project Nola.xcodeproj \
            -scheme Nola \
            -configuration Release \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Create DMG
        if: github.event_name == 'push'
        run: |
          hdiutil create \
            -volname "Nola" \
            -srcfolder build/derived/Build/Products/Release/Nola.app \
            -ov -format UDZO \
            Nola.dmg

      - name: Upload DMG
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: Nola.dmg
          path: Nola.dmg
